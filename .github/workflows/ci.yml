name: Quality Check CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Build check
        run: npm run build
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEXT_PUBLIC_SITE_URL: https://example.com
      - name: Emoji scan
        run: |
          if grep -rnP '[🔥😊🎯🚀💡🎉✨🌟💪🎊]' app/ src/ --include="*.tsx" --include="*.ts" 2>/dev/null; then
            echo "FAIL: Emoji in source"; exit 1
          fi
          echo "PASS: No emoji"
      - name: llms.txt check
        run: |
          [ -f "public/llms.txt" ] && echo "PASS: llms.txt exists" || echo "WARNING: public/llms.txt missing"
